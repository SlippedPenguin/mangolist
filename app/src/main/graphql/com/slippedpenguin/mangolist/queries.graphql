# AniList GraphQL operations.
#
# Apollo scans this file at build time and generates Kotlin types under
# com.slippedpenguin.mangolist.graphql. The schema.graphqls is auto-fetched
# from https://graphql.anilist.co on the first build via `--introspect`.
#
# Stubbed purpose: each operation is referenced from a Compose screen /
# Apollo client wrapper in v1.0+. v1 scaffold compiles because Apollo's
# codegen runs unconditionally on every .graphql file.
#
# v1.2.0: every list-style query now takes `$type: MediaType = ANIME`
# so the same query operations can serve anime *and* manga. Defaults keep
# every existing call site back-compatible. Synchronous fetches in
# AniListClient pass through the requested type verbatim ("ANIME" or
# "MANGA"); "BOTH" is a UI-only state that fans out into two sync calls
# rather than a third enum value on this enum.

query SearchAnime($search: String!, $perPage: Int = 12, $type: MediaType = ANIME) {
  Page(perPage: $perPage) {
    media(search: $search, type: $type, sort: [SEARCH_MATCH]) {
      ...AnimeCardFields
    }
  }
}

query GetMediaDetails($id: Int!, $type: MediaType = ANIME) {
  Media(id: $id, type: $type) {
    ...AnimeCardFields
    description(asHtml: false)
    status
    bannerImage
    season
    duration
    studios(isMain: true) {
      nodes {
        name
      }
    }
    characters(sort: [ROLE, RELEVANCE], perPage: 15) {
      edges {
        role
        node {
          id
          name {
            full
          }
          image {
            large
          }
        }
      }
    }
    relations {
      edges {
        relationType
        node {
          id
          title {
            romaji
            english
          }
          coverImage {
            large
          }
          type
          format
        }
      }
    }
  }
}

# `Viewer` is the AniList equivalent of "the logged-in user". Returns null
# if no auth token is attached.
query GetViewer {
  Viewer {
    id
    name
    avatar { large medium }
    statistics {
      anime {
        count
        meanScore
        episodesWatched
        minutesWatched
      }
    }
  }
}

# For sync: pull the user's full lists so the local DB can be reconciled.
# `$type` already existed pre-v1.2 — kept intact for call-site clarity.
query GetMediaListCollection($userId: Int!, $type: MediaType = ANIME) {
  MediaListCollection(userId: $userId, type: $type) {
    lists {
      name
      isCustomList
      entries {
        ...ListEntryFields
      }
    }
  }
}

# Push local edits back. Pass either id (existing entry) or mediaId (create new).
# Note: AniList v2's MediaList type does NOT expose a `favourite` field.
# AniList's favourites are media-level (`Media.isFavourite: Boolean!`),
# not list-entry-level. To toggle a favorite, use the standalone
# ToggleFavourite mutation (see below) — SaveMediaListEntry itself is
# for status/progress/score/notes only.
mutation SaveMediaListEntry(
  $id: Int
  $mediaId: Int
  $status: MediaListStatus
  $progress: Int
  $score: Float
  $notes: String
) {
  SaveMediaListEntry(
    id: $id
    mediaId: $mediaId
    status: $status
    progress: $progress
    score: $score
    notes: $notes
  ) {
    id
    status
    progress
    score
    notes
    updatedAt
  }
}

# Toggle the viewer's favourite flag on a single media. Media-level,
# not list-entry-level — every list the user has for this media will
# reflect the new state. The mutation itself returns the up-to-date
# User.favourites.anime { nodes { id } } connection so callers can
# verify the post-toggle state without a second round-trip.
mutation ToggleFavourite($animeId: Int) {
  ToggleFavourite(animeId: $animeId) {
    anime {
      nodes {
        id
      }
    }
  }
}

# Airing schedule between two epoch timestamps (for the Airing tab).
# Hand-rolled JSON POST in AniListClient — kept off Apollo to avoid
# fragment-spread codegen issues. `media { id }` is enough for "All
# airing" mode; `On my list` mode reads additional averageScore /
# status / banner from a per-anime Apollo call below.
query GetAiringSchedule($airingAtGreater: Int!, $airingAtLesser: Int!) {
  Page(perPage: 50) {
    airingSchedules(
      airingAt_greater: $airingAtGreater
      airingAt_lesser: $airingAtLesser
      sort: [TIME]
    ) {
      id
      airingAt
      episode
      media {
        ...AnimeCardFields
      }
    }
  }
}

# Discover-style sorted lists for the Explore tab's horizontal carousels.
# Each query returns ~25 Media items sans status / progress — Explore is a
# browsing surface, not a tracking surface, so AnimeCardFields is enough to
# render cover + title + format + year + averageScore for the poster cards.
# Per-page sizes are tuned for ~5 cards visible across the screen at once on
# a typical phone, with the next 20 rendering as you scroll the LazyRow.
#
# v1.2: take `$type: MediaType = ANIME` so the same query serves the
# manga carousel mode. The Media.type filter is mandatory on these
# queries; the default keeps every existing call site compatible.

query GetPopularAnime($type: MediaType = ANIME) {
  Page(perPage: 25) {
    media(type: $type, sort: [POPULARITY_DESC]) {
      ...AnimeCardFields
    }
  }
}

query GetTrendingAnime($type: MediaType = ANIME) {
  Page(perPage: 25) {
    media(type: $type, sort: [TRENDING_DESC]) {
      ...AnimeCardFields
    }
  }
}

query GetUpcomingAnime($type: MediaType = ANIME) {
  Page(perPage: 50) {
    media(type: $type, status: NOT_YET_RELEASED, sort: [START_DATE_DESC]) {
      ...AnimeCardFields
    }
  }
}

query GetTopRatedAnime($type: MediaType = ANIME) {
  Page(perPage: 25) {
    media(type: $type, sort: [SCORE_DESC]) {
      ...AnimeCardFields
    }
  }
}

# Genre-filtered top results for a single genre on the Explore tab's chip
# strip. Returns ~25 media items ordered by POPULARITY_DESC so the user
# sees the "biggest" titles in that genre first. Genre is AniList's free-form
# string (case-insensitive on AniList's side) — we pass-through whatever the
# chip text is, so chip labels must match AniList's canonical genre strings
# (Action, Romance, Isekai, …). See GenreChip.GENRES in ExploreScreen.kt
# for the curated chip set used in v1.1.
#
# v1.2: add `$type` so the genre grid can serve manga too.
query GetAnimeByGenre($genre: String!, $perPage: Int = 25, $type: MediaType = ANIME) {
  Page(perPage: $perPage) {
    media(genre_in: [$genre], type: $type, sort: [POPULARITY_DESC]) {
      ...AnimeCardFields
    }
  }
}

# v1.2: "Releasing manga" surface — mirrors Airing for anime. Manga has
# no `airingSchedules`, so the query uses `status: RELEASING` with
# `START_DATE_DESC` sort (recently-addded manga first). Same Manga-card
# shape as the four carousels via the AnimeCardFields fragment.
query GetMangaReleases {
  Page(perPage: 50) {
    media(type: MANGA, status: RELEASING, sort: [START_DATE_DESC]) {
      ...AnimeCardFields
    }
  }
}

# v1.2: per-anime airing lookup used by the `On my list` Airing tab.
# Already-v1.0 query — kept intact because Apollo Kotlin 4.x's
# fragment-spread codegen works for it. The hand-rolled JSON sibling
# in AniListClient (`getNextAiringFor`) carries the same AiringSlot
# data and is the source AiringCard reads from today.
query GetNextAiringEpisodes($ids: [Int!]) {
  Page(perPage: 50) {
    media(id_in: $ids, type: ANIME) {
      id
      title { romaji english }
      coverImage { large }
      nextAiringEpisode { id airingAt episode }
    }
  }
}

fragment AnimeCardFields on Media {
  id
  title { romaji english }
  coverImage { large medium color }
  episodes
  chapters
  volumes
  format
  averageScore
  startDate { year }
  genres
  status
  bannerImage
  # `type` is the discriminator between anime and manga. Always present on
  # AniList responses; we surface it in the data layer via mediaType mapping.
}

fragment ListEntryFields on MediaList {
  id
  status
  progress
  score
  notes
  updatedAt
  media {
    ...AnimeCardFields
    isFavourite
  }
}
