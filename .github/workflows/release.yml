name: Release APK

# Build a release APK on every pushed tag and upload it to a GitHub Release.
# Free for public repos (GitHub-hosted runners; no machine on your end needed).
#
# Why no `./gradlew` script in the repo: we use `gradle/actions/setup-gradle@v4`
# which downloads Gradle into the runner, generates a wrapper jar/script on the
# fly, and then runs `gradle assembleRelease`. You get the same inflated cache
# benefits without having to commit a binary jar.
#
# Signing: debug keystore only, so the APK installs via sideload but is NOT
# Play-Store-ready. Swap in a real release keystore before any public
# distribution (a v1.x concern).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the Release + upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Pin runtime; libs.versions.toml agp = 8.7.3 needs Gradle 8.9+.
          gradle-version: '8.11.1'
          # Built-in caching keyed off gradle files + wrapper props.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Write AniList OAuth secrets to local.properties so build.gradle.kts
      # picks them up as BuildConfig fields. Client ID is public; client
      # secret comes from the GitHub Actions secret store so it never leaks
      # into the source repo.
      - name: Configure AniList OAuth secrets
        run: |
          cat > local.properties <<EOF
          anilist.client.id=46025
          anilist.client.secret=${{ secrets.ANILIST_CLIENT_SECRET }}
          anilist.redirect.uri=com.slippedpenguin.mangolist
          EOF

      # Pull the live AniList GraphQL schema before assembly. The
      # `downloadAnilistApolloSchemaFromIntrospection` task writes to the path
      # configured by the apollo{} block in app/build.gradle.kts. We always
      # re-run (no caching) so codegen + build reflect the current AniList API.
      - name: Download AniList schema (Apollo)
        run: gradle --no-daemon downloadAnilistApolloSchemaFromIntrospection

      # We invoke `gradle` directly (not `./gradlew`) because gradlew lives
      # outside this commit. gradle/actions/setup-gradle@v4 above installs
      # Gradle into PATH on the runner, so calling `gradle` works without
      # committing the wrapper jar / scripts. Same Gradle pin (8.11.1) as
      # gradle-wrapper.properties.
      - name: Build release APK
        run: gradle --no-daemon assembleRelease ${{ runner.debug == 'true' && '--info' || '' }}

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
